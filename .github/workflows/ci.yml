name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://ci_user:${{ secrets.CI_POSTGRES_PASSWORD }}@localhost:5432/levelfit
      JWT_ACCESS_SECRET: ${{ secrets.CI_JWT_ACCESS_SECRET }}
      TOKEN_HASH_SECRET: ${{ secrets.CI_TOKEN_HASH_SECRET }}
      WEB_ORIGIN: http://127.0.0.1:3000
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run typecheck -w @levelfit/api
      - run: npm test -w @levelfit/api
      - run: npm run build
      - run: npm run build:api
