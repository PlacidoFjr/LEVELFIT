services:
  postgres:
    image: postgres:17-alpine
    container_name: levelfit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: levelfit
      POSTGRES_USER: levelfit
      POSTGRES_PASSWORD: levelfit_dev
    ports:
      - "5432:5432"
    volumes:
      - levelfit_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U levelfit -d levelfit"]
      interval: 5s
      timeout: 3s
      retries: 10
  redis:
    image: redis:7-alpine
    container_name: levelfit-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - levelfit_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  levelfit_postgres_data:
  levelfit_redis_data:
