services:
  - type: web
    name: levelfit-api
    runtime: node
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    healthCheckPath: /v1/health
    buildCommand: npm ci --include=dev && npm run db:generate && npm run build:api
    startCommand: npm run db:migrate:deploy && npm run start -w @levelfit/api
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_HOST
        value: 0.0.0.0
      - key: SWAGGER_ENABLED
        value: false
      - key: JWT_ISSUER
        value: levelfit-api
      - key: JWT_AUDIENCE
        value: levelfit-web
      - key: ACCESS_TOKEN_TTL_SECONDS
        value: 600
      - key: REFRESH_TOKEN_TTL_DAYS
        value: 30
      - key: DATABASE_URL
        sync: false
      - key: WEB_ORIGIN
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: TOKEN_HASH_SECRET
        sync: false
